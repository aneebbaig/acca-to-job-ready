name: Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, and what went wrong?
      placeholder: Steps to reproduce, and what you expected instead.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Auth / user management
        - Roadmap / topics
        - Practice / assessment
        - AI provider settings
        - Docs / setup
        - Other
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environment
      placeholder: e.g. Node 20, Chrome, deployed on Render
  - type: checkboxes
    id: no-secrets
    attributes:
      label: Confirmation
      options:
        - label: I have not included any API keys, secrets, or personal data in this report.
          required: true
