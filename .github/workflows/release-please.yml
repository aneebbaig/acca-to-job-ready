name: release-please

# Automated releases from Conventional Commits. On every push to main,
# release-please maintains a release PR that bumps the version and updates the
# changelog; merging it tags a GitHub release.
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v5
        with:
          release-type: node
