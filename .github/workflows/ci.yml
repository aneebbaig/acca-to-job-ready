name: CI

on:
  push:
    branches: [main, develop, production]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        # `npm install` (not `npm ci`) installs deterministically from the
        # committed lockfile while tolerating npm's cross-platform optional-dep
        # graph (the Tailwind oxide wasm fallback pulls platform-specific deps
        # that npm ci flags as out-of-sync on Linux).
        run: npm install --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          # Placeholder values so the build compiles without a real database or
          # secrets. Pages are dynamic, so nothing connects to Postgres at build.
          DATABASE_URL: postgresql://user:pass@localhost:5432/db
          AUTH_SECRET: ci-placeholder-secret-not-used-at-runtime
          AUTH_URL: http://localhost:3000
